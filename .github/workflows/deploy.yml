name: Deploy to GitHub Pages

on:
  push:
    branches: [main, preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Singleton-Lock: nur ein Pages-Deploy gleichzeitig.
  # cancel-in-progress: true — laufende oder gequeue Builds werden gecancelt
  # sobald ein neuerer Push kommt. Begruendung: unser Build holt main + preview
  # immer aus den neuesten Refs (Z. checkout @main + checkout @preview), daher
  # ist ein aelter laufender Build per Definition veraltet sobald ein neuer
  # Push kommt. So vermeiden wir die "Canceling since a higher priority
  # waiting request for pages exists"-Meldung — der aeltere Build cancelt
  # sich sofort und sauber.
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Production immer von main bauen (auch wenn preview-Push den Workflow triggert)
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces dependencies
        run: npm ci

      - name: Build Unterrichtsplaner
        working-directory: Unterrichtsplaner
        run: npx tsc -b && npx vite build

      - name: Audit `any` Use (Bundle L Gate)
        working-directory: ExamLab
        run: npm run lint:as-any

      - name: Audit alert() Use (Bundle R Gate)
        working-directory: ExamLab
        # --if-present: skipt sauber, falls Bundle R noch nicht auf main gemergt ist.
        # Sobald Bundle R auf main ist, aktiviert sich der Gate automatisch.
        run: npm run lint:no-alert --if-present

      - name: Audit __tests__/ Directories (Bundle Q Gate)
        working-directory: ExamLab
        run: npm run lint:no-tests-dir

      - name: Audit musterloesung Field-Drift (Bundle P-Doku Gate)
        working-directory: ExamLab
        # --if-present: skipt sauber, falls Bundle P-Doku noch nicht auf main gemergt ist.
        # Sobald Bundle P-Doku auf main ist, aktiviert sich der Gate automatisch.
        run: npm run lint:musterloesung --if-present

      - name: Run vitest
        working-directory: ExamLab
        run: npm test

      - name: Build ExamLab (unified)
        working-directory: ExamLab
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
        run: npx tsc -b && npx vite build

      # Combine: repo root (Uebungen etc.) + Unterrichtsplaner + ExamLab
      - name: Prepare combined site
        run: |
          mkdir -p _site/Unterrichtsplaner _site/ExamLab _site/Pruefung _site/Lernplattform
          # Copy static content (Uebungen liegt jetzt unter ExamLab/, wird separat an alter URL gespiegelt) + root landing page
          cp -r ExamLab/Uebungen _site/Uebungen
          cp index.html _site/ 2>/dev/null || true
          # Copy Unterrichtsplaner build output
          cp -r Unterrichtsplaner/dist/* _site/Unterrichtsplaner/
          # Copy ExamLab build output
          cp -r ExamLab/dist/* _site/ExamLab/
          # Redirects: alte URLs → /ExamLab/
          echo '<meta http-equiv="refresh" content="0;url=/GYM-WR-DUY/ExamLab/">' > _site/Pruefung/index.html
          echo '<meta http-equiv="refresh" content="0;url=/GYM-WR-DUY/ExamLab/">' > _site/Lernplattform/index.html
          # 404.html für BrowserRouter SPA-Routing (nur ExamLab-Pfade)
          cp 404.html _site/404.html 2>/dev/null || true
          # Clean up macOS artifacts
          find _site -name '.DS_Store' -delete

      # === Staging: ExamLab vom preview-Branch bauen (falls vorhanden) ===
      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: preview
          path: preview-src
        continue-on-error: true
        id: checkout-preview

      # Staging installs against preview-branch which may still use old per-package
      # lockfiles. Once preview-branch is also on workspaces (post-merge of this bundle
      # via FF-push main:preview), these two steps can also be consolidated to a single
      # root `npm ci` in preview-src/.
      - name: Install Staging Shared dependencies
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/packages/shared
        run: npm ci

      - name: Install Staging dependencies
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/ExamLab
        run: npm ci

      - name: Audit `any` Use (Bundle L Gate, staging)
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/ExamLab
        run: npm run lint:as-any

      - name: Audit alert() Use (Bundle R Gate, staging)
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/ExamLab
        run: npm run lint:no-alert

      - name: Audit __tests__/ Directories (Bundle Q Gate, staging)
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/ExamLab
        run: npm run lint:no-tests-dir

      - name: Audit musterloesung Field-Drift (Bundle P-Doku Gate, staging)
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/ExamLab
        run: npm run lint:musterloesung

      - name: Run vitest (staging)
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/ExamLab
        run: npm test

      - name: Build Staging (ExamLab from preview)
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/ExamLab
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
          VITE_BASE_PATH: /GYM-WR-DUY/staging/
          VITE_ENABLE_NEW_HEADER: "1"
        run: npx tsc -b && npx vite build

      - name: Add staging to site
        if: steps.checkout-preview.outcome == 'success'
        run: |
          mkdir -p _site/staging
          cp -r preview-src/ExamLab/dist/* _site/staging/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
